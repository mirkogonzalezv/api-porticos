version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: api_porticos_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-porticos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-porticos_pass}
      POSTGRES_DB: ${DB_NAME:-porticos_db}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-porticos_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: api_porticos_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
